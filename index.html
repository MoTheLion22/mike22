/* ── LIGHT THEME (default) ── */

/* ── DARK THEME ── */
body.dark {

body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);transition:background 0.25s,color 0.25s}

table{color:var(--text)}

/* Dark mode overrides for hardcoded colors */

body.dark select option{background:var(--surface2);color:var(--text)}

@media print {
  @page { margin: 10mm; size: A4 portrait; }

  /* Force ALL backgrounds/colors to render */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }

  /* Hide everything except report */
  body * { visibility: hidden !important; }
  #print-report-box, #print-report-box * { visibility: visible !important; }

  /* Kill the modal backdrop entirely */
  #print-report-overlay {
    display: contents !important;
    background: none !important;
  }

  /* Report box becomes a normal document flow block */
  #print-report-box {
    position: fixed !important;
    top: 0 !important; left: 0 !important;
    width: 100vw !important;
    max-width: 100vw !important;
    max-height: none !important;
    height: auto !important;
    overflow: visible !important;
    box-shadow: none !important;
    border: none !important;
    border-radius: 0 !important;
    display: flex !important;
    flex-direction: column !important;
  }

  /* Inner scroll container — expand fully, no clipping */
  #print-report-inner {
    overflow: visible !important;
    max-height: none !important;
    height: auto !important;
    flex: none !important;
    padding: 4px 28px 28px !important;
  }

  /* Hide close button and print button */
  #print-report-close, .no-print { display: none !important; visibility: hidden !important; }
}

function SVGBarChart({data,cp}){
  if(!data||!data.length)return null;
  const W=460,H=200,pad={t:10,r:10,b:70,l:28};
  const iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const maxV=Math.max(...data.map(d=>d.fulfilled),1);
  const slotW=iW/data.length;
  const bW=Math.max(10,Math.floor(slotW*0.52));
  return(
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:'visible'}}>
      {[0,Math.ceil(maxV/2),maxV].map((v,i)=>{
        const y=pad.t+iH-Math.round((v/maxV)*iH);
        return <g key={i}><line x1={pad.l} x2={W-pad.r} y1={y} y2={y} stroke="#f1f5f9" strokeWidth="1"/><text x={pad.l-4} y={y+3} fill="#cbd5e1" fontSize="8" textAnchor="end">{v}</text></g>;
      })}
      {data.map((d,i)=>{
        const bH=Math.max(3,Math.round((d.fulfilled/maxV)*iH));
        const x=pad.l+i*slotW+(slotW-bW)/2;
        const y=pad.t+iH-bH;
        const col=d.pct>=85?GREEN:d.pct>=55?AMBER:RED;
        const lx=x+bW/2;
        const labelY=pad.t+iH+8;
        return(
          <g key={i}>
            <rect x={x} y={pad.t} width={bW} height={iH} fill="#f8fafc" rx={3}/>
            <rect x={x} y={y} width={bW} height={bH} fill={col} rx={3} opacity="0.85"/>
            <text
              x={lx} y={labelY}
              fill="#94a3b8" fontSize="8.5"
              textAnchor="end"
              transform={`rotate(-40, ${lx}, ${labelY})`}
            >{d.cat}</text>
          </g>
        );
      })}
    </svg>
  );
}

  const getNotifications=()=>{
    const notifs=[];
    const today=new Date();today.setHours(0,0,0,0);

    // 1. Contract expiry + renewal alerts
    partners.forEach(p=>{
      const reminderDays=p.reminder_days||30;
      if(p.end_date){
        const end=new Date(p.end_date);end.setHours(0,0,0,0);
        const daysLeft=Math.round((end-today)/(1000*60*60*24));
        if(daysLeft<0){
          notifs.push({id:'expd_'+p.partner_id,type:'expired',category:'contract',partner:p,daysLeft,
            msg:'Contract expired '+Math.abs(daysLeft)+'d ago',urgency:'high',
            icon:'🔴',action:()=>{setActivePid(p.partner_id);setPage('detail');}});
        } else if(daysLeft<=reminderDays){
          notifs.push({id:'exp_'+p.partner_id,type:'expiry',category:'contract',partner:p,daysLeft,
            msg:'Contract expires in '+daysLeft+' day'+(daysLeft!==1?'s':''),
            urgency:daysLeft<=7?'high':daysLeft<=30?'medium':'low',
            icon:'⚠️',action:()=>{setActivePid(p.partner_id);setPage('detail');}});
        }
      }
      if(p.renewal_date){
        const renewal=new Date(p.renewal_date);renewal.setHours(0,0,0,0);
        const daysLeft=Math.round((renewal-today)/(1000*60*60*24));
        if(daysLeft>=0&&daysLeft<=(p.reminder_days||30)){
          notifs.push({id:'ren_'+p.partner_id,type:'renewal',category:'contract',partner:p,daysLeft,
            msg:'Renewal deadline in '+daysLeft+' day'+(daysLeft!==1?'s':''),
            urgency:daysLeft<=7?'high':daysLeft<=14?'medium':'low',
            icon:'🔄',action:()=>{setActivePid(p.partner_id);setPage('detail');}});
        }
      }
    });

    // 2. Upcoming activities in the next 7 days
    const in7=new Date(today);in7.setDate(in7.getDate()+7);
    matches.forEach(m=>{
      if(!m.match_date)return;
      const mDate=new Date(m.match_date+'T00:00:00');mDate.setHours(0,0,0,0);
      const daysLeft=Math.round((mDate-today)/(1000*60*60*24));
      if(daysLeft>=0&&daysLeft<=7){
        const acts=matchActivations.filter(a=>a.match_id===m.id);
        const pending=acts.filter(a=>a.status==='Pending').length;
        notifs.push({id:'match_'+m.id,type:'upcoming_match',category:'activity',daysLeft,
          msg:(daysLeft===0?'Today':'In '+daysLeft+'d')+': '+m.opponent+(m.sport?' ('+m.sport+')':''),
          sub:pending>0?pending+' rights pending':'No rights assigned',
          urgency:daysLeft===0?'high':daysLeft<=2?'medium':'low',
          icon:'📅',action:()=>{setPage('calendar');}});
      }
    });

    // 3. Partners with 0% completion that have obligations
    partners.forEach(p=>{
      const obs=obligations.filter(o=>o.partner_id===p.partner_id);
      if(obs.length>0){
        const comp=partComp(p.partner_id);
        const totalC=obs.reduce((a,o)=>a+(o.rights_per_season||0),0);
        if(comp===0&&totalC>0){
          notifs.push({id:'zero_'+p.partner_id,type:'zero_progress',category:'progress',partner:p,daysLeft:999,
            msg:p.name+' has 0% completion',sub:totalC+' rights not started',
            urgency:'low',icon:'📊',action:()=>{setActivePid(p.partner_id);setPage('detail');}});
        }
      }
    });

    return notifs.sort((a,b)=>{
      const urgOrder={high:0,medium:1,low:2};
      return (urgOrder[a.urgency]||2)-(urgOrder[b.urgency]||2)||a.daysLeft-b.daysLeft;
    });
  };

                          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:3}}>

                          <PBar value={c} height={3}/>
                        </div>
                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:c>=85?GREEN:c>=55?AMBER:RED,fontWeight:700,flexShrink:0}}>{c}%</span>
                      </div>

                  })}
                </div>
              </div>
            </div>

          {/* PARTNERS LIST */}
          {page==='partners'&&<div className="fade-up">

                <button key={t} onClick={()=>setTierFilter(t)} className="btn"

                      <div style={{display:'flex',alignItems:'center',gap:9}}>
                        <div style={{width:38,height:38,borderRadius:9,background:(TIER_META[p.tier]?.bg||'#f1f5f9'),border:`2px solid ${TIER_META[p.tier]?.badge||'#e2e8f0'}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>{tierIcon(p.tier)}</div>

                          <div style={{fontWeight:700,color:'var(--text)',fontSize:13,marginBottom:4}}>{p.name}</div>

                        </div>
                      </div>
                      <Ring value={c}/>

                    <div style={{fontSize:11,color:'var(--text3)',marginBottom:9}}>{obligations.filter(o=>o.partner_id===p.partner_id).length} rights · {p.category||'—'}{p.owner&&` · ${p.owner}`}</div>

                      <span style={{color:'var(--text3)'}}>Until {fmtDate(p.end_date)}</span>
                      <span style={{color:c>=85?GREEN:c>=55?AMBER:RED,fontWeight:700}}>{c}%</span>
                    </div>
                  </div>
                );

                onMouseEnter={e=>{e.currentTarget.style.borderColor=cp;e.currentTarget.style.background=cp+'06';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.background='transparent';}}>
                <div style={{width:34,height:34,borderRadius:9,background:'var(--surface3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:'var(--text3)'}}>+</div>
                <span style={{color:'var(--text3)',fontSize:13,fontWeight:600}}>Add Partner</span>
              </div>
            </div>
          </div>}

          {/* PARTNER DETAIL */}
          {page==='detail'&&activePart&&(()=>{
            const p=activePart,obs=partOblig;
            const tC=obs.reduce((a,o)=>a+(o.rights_per_season||0),0);
            const tA=obs.reduce((a,o)=>a+(o.activated_this_season||0),0);
            const comp=pct(tA,tC);
            return(
              <div className="fade-up">
                <div className="card" style={{padding:20,marginBottom:14,borderLeft:`4px solid ${p.color||cp}`}}>

                        <TierBadge tier={p.tier}/>

                      <div style={{marginLeft:49,display:'flex',flexWrap:'wrap',gap:'6px 16px',marginTop:4}}>

                        <div style={{display:'flex',alignItems:'center',gap:4}}>

                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{p.category||'—'}</span>
                        </div>
                        {/* Owner */}
                        {p.owner&&<div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6}}>Owner</span>
                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{p.owner}</span>
                        </div>}
                        {/* Contract period */}
                        <div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6}}>Contract</span>
                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{fmtDate(p.start_date)} – {fmtDate(p.end_date)}</span>
                        </div>
                        {/* Remaining months */}
                        {p.end_date&&(()=>{
                          const end=new Date(p.end_date);
                          const now=new Date();
                          const months=Math.max(0,Math.round((end-now)/(1000*60*60*24*30.44)));
                          const expired=end<now;
                          const color=expired?RED:months<=3?RED:months<=6?AMBER:GREEN;
                          return(
                            <div style={{display:'flex',alignItems:'center',gap:4}}>
                              <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6}}>Remaining</span>
                              <span style={{fontSize:12,fontWeight:700,color,background:color+'14',padding:'1px 8px',borderRadius:99,border:'1px solid '+color+'33'}}>
                                {expired?'Expired':months===0?'This month':months+' month'+(months>1?'s':'')}
                              </span>
                            </div>
                          );
                        })()}
                        {/* Contract value */}
                        {p.contract_value>0&&<div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6}}>Value</span>
                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{fmtCurrency(p.contract_value,p.contract_currency||'SAR')}</span>
                          {(p.contract_currency||'SAR')!=='SAR'&&p.contract_value_sar>0&&(
                            <span style={{fontSize:11,color:'var(--text3)'}}>≈ {fmtCurrency(p.contract_value_sar,'SAR')}</span>
                          )}
                        </div>}
                        {/* Renewal date */}
                        {p.renewal_date&&<div style={{display:'flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6}}>Renewal</span>
                          <span style={{fontSize:12,color:'var(--text2)',fontWeight:600}}>{fmtDate(p.renewal_date)}</span>
                        </div>}

                          <a href={p.contract_file_url} download={p.contract_file_name}
                            style={{fontSize:12,color:cp,fontWeight:600,textDecoration:'none',display:'flex',alignItems:'center',gap:3}}>
                            📄 {p.contract_file_name}
                          </a>
                        </div>}
                      </div>
                      {/* Sports row */}
                      {(()=>{
                        const sports=Array.isArray(p.sports)?p.sports:(typeof p.sports==='string'?JSON.parse(p.sports||'[]'):[]);

                        return(
                          <div style={{display:'flex',alignItems:'center',gap:8,marginTop:8,flexWrap:'wrap'}}>
                            <span style={{fontSize:10,fontWeight:700,color:'var(--text4)',textTransform:'uppercase',letterSpacing:0.6,flexShrink:0}}>Sports ({sports.length})</span>
                            {sports.sort().map(s=>(
                              <span key={s} style={{fontSize:11,fontWeight:600,padding:'2px 10px',borderRadius:99,background:cp+'12',color:cp,border:'1px solid '+cp+'30'}}>{s}</span>
                            ))}
                          </div>
                        );
                      })()}
                    </div>
                    <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
                      <button onClick={()=>openRightsPicker(p.partner_id)} className="btn" style={{background:cp,color:'#fff',borderRadius:7,padding:'7px 13px',fontSize:12}}>⚡ Assign Rights</button>
                      <button onClick={()=>setModal('report')} className="btn" style={{background:'var(--surface3)',color:cp,borderRadius:7,padding:'7px 13px',fontSize:12,border:`1px solid ${cp}33`}}>📄 Report</button>
                      <button onClick={()=>openEditPart(p)} className="btn" style={{background:'var(--surface3)',color:'var(--text2)',borderRadius:7,padding:'7px 13px',fontSize:12,border:'1px solid var(--border)'}}>Edit</button>
                      <button onClick={()=>delPart(p.partner_id)} className="btn" style={{background:'rgba(239,68,68,0.10)',color:RED,borderRadius:7,padding:'7px 13px',fontSize:12,border:'1px solid #FECACA'}}>Delete</button>
                    </div>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(120px,1fr))',gap:10,marginBottom:14}}>
                  {[{l:'Rights',v:obs.length},{l:'Contracted',v:tC},{l:'Activated',v:tA},{l:'Remaining',v:tC-tA},{l:'Completion',v:`${comp}%`}].map((k,i)=>(
                    <div key={i} className="card" style={{padding:'12px 14px'}}>
                      <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:i===4?(comp>=85?GREEN:comp>=55?AMBER:RED):'#1a2332'}}>{k.v}</div>
                      <div style={{fontSize:11,color:'var(--text3)',fontWeight:600,marginTop:2}}>{k.l}</div>
                    </div>

                    <span style={{fontFamily:"'DM Mono',monospace",fontWeight:700,color:comp>=85?GREEN:comp>=55?AMBER:RED}}>{comp}%</span>
                  </div>
                  <PBar value={comp} height={10}/>
                </div>

                <div className="card" style={{padding:20}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

                      <div style={{display:'flex',gap:5}}>
                        <button onClick={()=>{
                          const cats=[...new Set(obs.map(o=>o.category))];
                          const allOpen=cats.every(c=>expandedCats['detail_'+c]);
                          const next={};cats.forEach(c=>next['detail_'+c]=!allOpen);
                          setExpandedCats(e=>({...e,...next}));
                        }} className="btn" style={{background:'var(--surface3)',color:'var(--text2)',borderRadius:6,padding:'3px 9px',fontSize:11,border:'1px solid var(--border)'}}>
                          {[...new Set(obs.map(o=>o.category))].every(c=>expandedCats['detail_'+c])?'Collapse all':'Expand all'}
                        </button>
                      </div>
                    </div>
                    <button onClick={()=>openRightsPicker(p.partner_id)} className="btn" style={{background:cp+'14',color:cp,borderRadius:8,padding:'7px 13px',fontSize:12,border:'1px solid '+cp+'33'}}>⚡ Manage Rights</button>
                  </div>
                  {obs.length===0
                    ?<div style={{textAlign:'center',padding:'36px 0',color:'var(--text3)',fontSize:13}}>No rights added yet.</div>
                    :<div style={{display:'flex',flexDirection:'column',gap:6}}>
                      {[...new Set(obs.map(o=>o.category))].sort().map(cat=>{
                        const co=obs.filter(o=>o.category===cat);
                        const isOpen=!!expandedCats['detail_'+cat];
                        const catDone=co.reduce((a,o)=>a+(o.activated_this_season||0),0);
                        const catTotal=co.reduce((a,o)=>a+(o.rights_per_season||0),0);
                        const catPct=pct(catDone,catTotal);
                        const catStatus=catDone===0?'Not Started':catPct>=100?'Delivered':catPct>=40?'In Progress':'Delayed';
                        const sm=STATUS_META[catStatus];
                        return(
                          <div key={cat} style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden',marginBottom:2}}>
                            {/* Category header - clickable */}
                            <div onClick={()=>setExpandedCats(e=>({...e,['detail_'+cat]:!e['detail_'+cat]}))}
                              style={{display:'flex',alignItems:'center',gap:10,padding:'10px 14px',
                                background:isOpen?cp+'06':'var(--surface2)',cursor:'pointer',userSelect:'none',
                                borderBottom:isOpen?'1px solid '+cp+'15':'none',transition:'background 0.15s'}}>
                              <span style={{fontSize:11,color:'var(--text3)',transition:'transform 0.2s',display:'inline-block',transform:isOpen?'rotate(90deg)':'rotate(0deg)',flexShrink:0}}>▶</span>
                              <span style={{fontWeight:700,fontSize:13,color:'var(--text)',textTransform:'uppercase',letterSpacing:0.8,flex:1}}>{cat}</span>
                              <span style={{fontSize:11,color:'var(--text3)'}}>{co.length} right{co.length>1?'s':''}</span>
                              <span style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:sm.color,fontWeight:700}}>{catDone}/{catTotal}</span>
                              <span style={{fontSize:10,fontWeight:700,padding:'2px 9px',borderRadius:99,background:sm.bg,color:sm.color,border:'1px solid '+sm.border,whiteSpace:'nowrap',minWidth:82,textAlign:'center'}}>{catStatus}</span>
                            </div>
                            {/* Rights list - only when expanded */}
                            {isOpen&&<div style={{padding:'8px 10px',display:'flex',flexDirection:'column',gap:5,background:'var(--surface2)'}}>
                              {co.map(o=>{
                                const p2=pct(o.activated_this_season,o.rights_per_season);
                                return(
                                  <div key={o.id} style={{background:'var(--surface2)',borderRadius:7,border:'1px solid var(--border2)',padding:'9px 12px'}}>
                                    <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
                                      <span style={{fontWeight:600,color:'var(--text)',fontSize:13,flex:1,minWidth:100}}>{o.right_name}</span>
                                      <RAGBadge value={o.activated_this_season} contracted={o.rights_per_season}/>
                                      <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                                        <button onClick={()=>quickUpdate(o,-1)} className="btn" style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text2)',borderRadius:5,width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>−</button>
                                        <span style={{fontFamily:"'DM Mono',monospace",fontSize:12,color:'var(--text)',minWidth:50,textAlign:'center',fontWeight:600}}>{o.activated_this_season||0}/{o.rights_per_season||0}</span>
                                        <button onClick={()=>quickUpdate(o,1)} className="btn" style={{background:cp+'14',border:`1px solid ${cp}40`,color:cp,borderRadius:5,width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>+</button>
                                      </div>
                                      <span style={{fontSize:11,color:'var(--text3)',flexShrink:0}}>{o.unit}</span>
                                      <div style={{display:'flex',gap:4,flexShrink:0}}>
                                        <button onClick={()=>openLogActiv(o)} className="btn" style={{background:cp+'12',border:`1px solid ${cp}30`,color:cp,borderRadius:5,padding:'3px 8px',fontSize:11}}>Log</button>
                                        <button onClick={()=>openRightsPicker(p.partner_id,o.category)} className="btn" style={{background:'var(--surface3)',border:'1px solid var(--border)',color:'var(--text2)',borderRadius:5,padding:'3px 8px',fontSize:11}}>Manage</button>
                                        <button onClick={()=>delOblig(o.id)} className="btn" style={{background:'rgba(239,68,68,0.10)',border:'1px solid #FECACA',color:RED,borderRadius:5,padding:'3px 8px',fontSize:11}}>✕</button>
                                      </div>
                                    </div>
                                    <PBar value={p2} height={4}/>
                                  </div>
                                );
                              })}
                            </div>}
                          </div>
                        );
                      })}
                    </div>
                  }
                </div>
              </div>
            );
          })()}

          {/* ACTIVITY LOG */}
          {page==='activity'&&<div className="fade-up">
            <div style={{marginBottom:18}}>
              <h2 style={{fontSize:20,fontWeight:800,color:'var(--text)'}}>Activity Log</h2>
              <p style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{activations.length} activation records</p>
            </div>
            <div className="card" style={{padding:20}}>
              {activations.length===0
                ?<div style={{textAlign:'center',padding:'40px 0',color:'var(--text3)',fontSize:13}}>No activations yet.</div>
                :<div style={{display:'flex',flexDirection:'column',gap:5}}>
                  <div style={{display:'grid',gridTemplateColumns:'100px 1fr 1fr 50px 80px 1fr',gap:10,padding:'5px 10px',fontSize:10,fontWeight:700,color:'var(--text3)',textTransform:'uppercase',letterSpacing:0.8}}>
                    <span>Date</span><span>Partner</span><span>Right</span><span>Qty</span><span>Channel</span><span>Notes</span>
                  </div>
                  {activations.map(a=>{
                    const partner=partners.find(p=>p.partner_id===a.partner_id);
                    return(
                      <div key={a.id} style={{display:'grid',gridTemplateColumns:'100px 1fr 1fr 50px 80px 1fr',gap:10,padding:'8px 10px',background:'var(--surface2)',borderRadius:7,border:'1px solid var(--border2)',fontSize:12,alignItems:'center'}}>
                        <span style={{fontFamily:"'DM Mono',monospace",color:'var(--text3)',fontSize:11}}>{fmtDate(a.activation_date)}</span>
                        <div style={{display:'flex',alignItems:'center',gap:6,overflow:'hidden'}}>
                          <div style={{width:17,height:17,borderRadius:4,background:(TIER_META[partner?.tier]?.bg||'#f1f5f9'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,flexShrink:0}}>{tierIcon(partner?.tier)}</div>
                          <span style={{fontWeight:600,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{partner?.name||a.partner_id}</span>
                        </div>
                        <span style={{color:'var(--text2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.right_id?.replace('R_','').replace(/_/g,' ')}</span>

                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span style={{fontWeight:800,fontSize:18,color:'var(--text)'}}>{currentSeason.label}</span>
                          <span style={{fontSize:10,fontWeight:700,padding:'3px 10px',borderRadius:99,background:GREEN+'14',color:GREEN,border:'1px solid '+GREEN+'25'}}>ACTIVE SEASON</span>
                        </div>
                        <div style={{fontSize:12,color:'var(--text3)',marginTop:3}}>{fmtDate(currentSeason.start_date)} → {fmtDate(currentSeason.end_date)}</div>
                      </div>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:14}}>
                    {[
                      {l:'Partners',v:partners.length,c:cp},
                      {l:'Activations',v:activations.length,c:GREEN},
                      {l:'Activities',v:matches.length,c:'#8B5CF6'},
                    ].map((k,i)=>(
                      <div key={i} style={{textAlign:'center',background:'var(--surface)',borderRadius:8,padding:'10px',border:'1px solid '+cp+'15'}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:k.c}}>{k.v}</div>
                        <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',marginTop:2}}>{k.l}</div>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>{setModal(null);setTimeout(()=>setSeasonModal('manage'),50);}} className="btn"
                    style={{width:'100%',background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:13,fontWeight:700}}>
                    📦 Manage / Archive Season
                  </button>
                </div>
                :<div style={{background:'var(--surface2)',border:'1px dashed #e2e8f0',borderRadius:10,padding:16,textAlign:'center',color:'var(--text3)',fontSize:13}}>
                  No active season found. Create one below.
                </div>
              }

              {/* Create new season */}
              <div className="card" style={{padding:18}}>
                <div style={{fontWeight:700,fontSize:14,color:'var(--text)',marginBottom:14}}>➕ Create New Season</div>
                <div style={{display:'flex',flexDirection:'column',gap:10}}>
                  <div style={{display:'flex',gap:12}}>
                    <Field label="Start Date" half>
                      <input type="date" value={newSeasonForm.start_date} onChange={e=>{
                        const start=e.target.value;
                        setNewSeasonForm(f=>{
                          const autoLabel=(start,end)=>{
                            if(!start)return f.label;
                            const sy=new Date(start).getFullYear();
                            const ey=end?new Date(end).getFullYear():sy+1;
                            const generated=sy+'/'+(String(ey).slice(-2));
                            // Only auto-fill if label is empty or was previously auto-generated
                            const wasAuto=!f.label||f.label===f._autoLabel;
                            return wasAuto?generated:f.label;
                          };
                          const newLabel=autoLabel(start,f.end_date);
                          return{...f,start_date:start,label:newLabel,_autoLabel:newLabel};
                        });
                      }} style={IS}/>
                    </Field>
                    <Field label="End Date" half>
                      <input type="date" value={newSeasonForm.end_date} onChange={e=>{
                        const end=e.target.value;
                        setNewSeasonForm(f=>{
                          const sy=f.start_date?new Date(f.start_date).getFullYear():new Date(end).getFullYear()-1;
                          const ey=new Date(end).getFullYear();
                          const generated=sy+'/'+(String(ey).slice(-2));
                          const wasAuto=!f.label||f.label===f._autoLabel;
                          const newLabel=wasAuto?generated:f.label;
                          return{...f,end_date:end,label:newLabel,_autoLabel:newLabel};
                        });
                      }} style={IS}/>
                    </Field>
                  </div>
                  <Field label="Season Label">
                    <div style={{position:'relative'}}>
                      <input value={newSeasonForm.label} onChange={e=>setNewSeasonForm(f=>({...f,label:e.target.value,_autoLabel:null}))}
                        placeholder="Auto-filled from dates…" style={{...IS,paddingRight:newSeasonForm.label===newSeasonForm._autoLabel?70:IS.paddingRight||12}}/>
                      {newSeasonForm.label&&newSeasonForm.label===newSeasonForm._autoLabel&&(
                        <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:9,fontWeight:700,color:GREEN,background:GREEN+'12',padding:'1px 6px',borderRadius:99,pointerEvents:'none'}}>Auto</span>
                      )}
                    </div>
                  </Field>
                </div>
                <button onClick={createNewSeason} disabled={saving} className="btn"
                  style={{width:'100%',background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:13,marginTop:14,fontWeight:700,opacity:saving?0.7:1}}>
                  {saving?'Creating…':'✓ Create Season'}
                </button>
              </div>

              {/* Archived seasons history */}
              {seasons.filter(s=>s.status==='archived').length>0&&<div>
                <div style={{fontWeight:700,fontSize:12,color:'var(--text2)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:8}}>📚 Archived Seasons ({seasons.filter(s=>s.status==='archived').length})</div>
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  {seasons.filter(s=>s.status==='archived').sort((a,b)=>b.start_date.localeCompare(a.start_date)).map(s=>(
                    <div key={s.id} className="card" style={{padding:'11px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{s.label}</div>
                        <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(s.start_date)} → {fmtDate(s.end_date)} · Archived {s.archived_at?new Date(s.archived_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):''}</div>
                      </div>
                      <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'var(--surface3)',color:'var(--text3)',border:'1px solid var(--border)',flexShrink:0}}>ARCHIVED</span>
                    </div>
                  ))}
                </div>
              </div>}
            </div>}

            {/* ── SPORTS TAB ── */}
            {settingsTab==='sports'&&<div>
              <div style={{display:'flex',gap:8,marginBottom:14}}>
                <input value={newSportInput} onChange={e=>setNewSportInput(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'&&newSportInput.trim()){if(sportsOptions.some(s=>s.toLowerCase()===newSportInput.trim().toLowerCase()))return showToast('"'+newSportInput.trim()+'" already exists','error');const ns=[...sportsOptions,newSportInput.trim()].sort();setSportsOptions(ns);setNewSportInput('');saveAppConfig(tiersOptions,partnerCats,ns);}}}
                  placeholder="New sport name…" style={{...IS,flex:1}}/>
                <button onClick={()=>{if(newSportInput.trim()){if(sportsOptions.some(s=>s.toLowerCase()===newSportInput.trim().toLowerCase()))return showToast('"'+newSportInput.trim()+'" already exists','error');const ns=[...sportsOptions,newSportInput.trim()].sort();setSportsOptions(ns);setNewSportInput('');saveAppConfig(tiersOptions,partnerCats,ns);}}}
                  className="btn" style={{background:cp,color:'#fff',borderRadius:8,padding:'9px 16px',fontSize:13}}>Add</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:8}}>
                {[...sportsOptions].sort().map(sport=>{
                  const usedBy=partners.filter(p=>(p.sports||[]).includes(sport));
                  return(
                    <div key={sport} className="card" style={{padding:'10px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{sport}</div>
                        {usedBy.length>0
                          ?<div style={{fontSize:10,color:cp,fontWeight:700,marginTop:2}}>{usedBy.length} partner{usedBy.length>1?'s':''}</div>
                          :<div style={{fontSize:10,color:'var(--text3)',marginTop:2}}>unused</div>
                        }
                      </div>
                      <button onClick={()=>{
                        if(usedBy.length>0)return showToast(`Used by ${usedBy.length} partner(s)`,'error');
                        const ns=sportsOptions.filter(x=>x!==sport);setSportsOptions(ns);saveAppConfig(tiersOptions,partnerCats,ns);
                      }} className="btn" style={{background:usedBy.length>0?'#f1f5f9':'rgba(239,68,68,0.10)',color:usedBy.length>0?'#cbd5e1':RED,borderRadius:6,padding:'3px 8px',fontSize:11,border:`1px solid ${usedBy.length>0?'#e2e8f0':'rgba(239,68,68,0.25)'}`,flexShrink:0}}>
                        ✕
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>}

          </div>}

        </div>
      </div>

      {/* MODALS */}
      {(modal==='add-part'||modal==='edit-part')&&<Modal onClose={()=>setModal(null)} width={540}>
        <h3 style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:4}}>{modal==='add-part'?'New Partner':'Edit Partner'}</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:20}}>Fill in the sponsor details below</p>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>

          {/* Sponsor Name */}
          <Field label="Sponsor Name">
            <input value={pForm.name||''} onChange={e=>setPForm(f=>({...f,name:e.target.value}))} placeholder="e.g. Aramco, STC, Red Bull…" style={IS}/>
          </Field>

          {/* Tier + Category row */}
          <div style={{display:'flex',gap:12}}>
            <Field label={
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span>Tier</span>
                <button onClick={()=>setModal('manage-tiers')} style={{fontSize:10,color:cp,background:'none',border:'none',cursor:'pointer',fontWeight:700,padding:0}}>
                  Manage ({tiersOptions.length})
                </button>
              </div>
            } half>
              <select value={pForm.tier||''} onChange={e=>setPForm(f=>({...f,tier:e.target.value}))} style={{...IS,color:pForm.tier?'#1a2332':'#94a3b8'}}>
                <option value="" disabled>Select tier…</option>
                {[...tiersOptions].sort((a,b)=>tierRank(a)-tierRank(b)).map(t=>{
                  const used=partners.filter(p=>p.tier===t).length;
                  return <option key={t} value={t}>{t}{used>0?` (${used})`:''}</option>;
                })}
              </select>
            </Field>
            <Field label={
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span>Category</span>
                <button onClick={()=>setModal('manage-cats')} style={{fontSize:10,color:cp,background:'none',border:'none',cursor:'pointer',fontWeight:700,padding:0}}>
                  Manage ({partnerCats.length})
                </button>
              </div>
            } half>
              <select value={pForm.category||''} onChange={e=>setPForm(f=>({...f,category:e.target.value}))} style={{...IS,color:pForm.category?'#1a2332':'#94a3b8'}}>
                <option value="" disabled>Select category…</option>
                {partnerCats.map(c=>{
                  const used=partners.filter(p=>p.category===c).length;
                  return <option key={c} value={c}>{c}{used>0?` (${used})`:''}</option>;
                })}
              </select>
            </Field>
          </div>

          {/* Sports (multi-select pill style) */}
          <Field label={
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span>Sports Sponsored</span>
              <button onClick={()=>setModal('manage-sports')} style={{fontSize:10,color:cp,background:'none',border:'none',cursor:'pointer',fontWeight:700,padding:0}}>
                Manage ({sportsOptions.length})
              </button>
            </div>
          }>
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:10}}>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {[...sportsOptions].sort().map(s=>{
                  const sel=(pForm.sports||[]).includes(s);
                  return(
                    <button key={s} type="button" onClick={()=>setPForm(f=>({...f,sports:sel?(f.sports||[]).filter(x=>x!==s):[...(f.sports||[]),s]}))}
                      style={{padding:'5px 12px',borderRadius:99,fontSize:12,fontWeight:600,cursor:'pointer',border:`1.5px solid ${sel?cp:'#e2e8f0'}`,background:sel?cp+'14':'#fff',color:sel?cp:'#64748b',transition:'all 0.12s'}}>
                      {s}
                    </button>
                  );
                })}
              </div>
              {(pForm.sports||[]).length>0&&<div style={{marginTop:8,fontSize:11,color:cp,fontWeight:600}}>{(pForm.sports||[]).length} selected: {[...(pForm.sports||[])].sort().join(', ')}</div>}
            </div>
          </Field>

          {/* Owner + Color row */}
          <div style={{display:'flex',gap:12}}>
            <Field label="Account Owner" half>
              <input value={pForm.owner||''} onChange={e=>setPForm(f=>({...f,owner:e.target.value}))} placeholder="e.g. AG, MNH, PS" style={IS}/>
            </Field>
            <Field label="Accent Color" half>
              <div style={{display:'flex',gap:7}}>
                <input type="color" value={pForm.color||cp} onChange={e=>setPForm(f=>({...f,color:e.target.value}))} style={{...IS,width:42,padding:3,cursor:'pointer'}}/>
                <input value={pForm.color||''} onChange={e=>setPForm(f=>({...f,color:e.target.value}))} style={{...IS,flex:1}} placeholder="#0EA87A"/>
              </div>
            </Field>
          </div>

          {/* Contract dates */}
          <div style={{display:'flex',gap:12}}>
            <Field label="Contract Start" half>
              <input type="date" value={pForm.start_date||''} onChange={e=>setPForm(f=>({...f,start_date:e.target.value}))} style={IS}/>
            </Field>
            <Field label="Contract End" half>
              <input type="date" value={pForm.end_date||''} onChange={e=>{
                const newEnd=e.target.value;
                const renewal=calcRenewalDate(newEnd,pForm.reminder_days||30);
                setPForm(f=>({...f,end_date:newEnd,renewal_date:renewal}));
              }} style={IS}/>
            </Field>
          </div>

          {/* Contract value */}
          <Field label="Contract Value">
            <div style={{display:'flex',gap:0,background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,overflow:'hidden'}}>
              <select value={pForm.contract_currency||'SAR'}
                onChange={e=>{
                  const cur=e.target.value;
                  const sarVal=cur==='SAR'?pForm.contract_value:toSAR(pForm.contract_value,cur);
                  setPForm(f=>({...f,contract_currency:cur,contract_value_sar:sarVal,contract_value_sar_override:false}));
                }}
                style={{...IS,width:90,borderRadius:0,border:'none',borderRight:'1px solid #e2e8f0',background:'var(--surface3)',fontWeight:700,color:'var(--text2)',flexShrink:0}}>
                {CURRENCIES.map(c=><option key={c.code} value={c.code}>{c.code}</option>)}
              </select>
              <input type="text"
                value={pForm.contract_value_display||(pForm.contract_value?Number(pForm.contract_value).toLocaleString('en-US'):'')}
                onChange={e=>{
                  const raw=e.target.value.replace(/,/g,'');
                  const num=parseFloat(raw)||0;
                  const sarVal=(pForm.contract_currency||'SAR')==='SAR'?num:toSAR(num,pForm.contract_currency||'SAR');
                  setPForm(f=>({...f,contract_value:num,contract_value_display:raw===''?'':Number(raw||0).toLocaleString('en-US'),contract_value_sar:sarVal,contract_value_sar_override:false}));
                }}
                onBlur={e=>{
                  const raw=e.target.value.replace(/,/g,'');
                  const num=parseFloat(raw)||0;
                  if(num>0)setPForm(f=>({...f,contract_value:num,contract_value_display:num.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}));
                }}
                placeholder="0.00"
                style={{...IS,border:'none',borderRadius:0,background:'transparent',flex:1}}/>
            </div>
            {/* SAR equivalent - shown when currency is not SAR */}
            {pForm.contract_value>0&&(pForm.contract_currency||'SAR')!=='SAR'&&(
              <div style={{marginTop:8,background:'rgba(245,158,11,0.10)',border:'1px solid #FDE68A',borderRadius:8,padding:'8px 12px'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
                  <div>
                    <span style={{fontSize:10,fontWeight:700,color:'#92400E',textTransform:'uppercase',letterSpacing:0.5}}>SAR Equivalent </span>
                    <span style={{fontSize:10,color:'#B45309'}}>{pForm.contract_value_sar_override?'(manually edited)':'(estimated)'}</span>
                  </div>
                  <span style={{fontSize:10,color:'var(--text3)'}}>Rate: 1 {pForm.contract_currency} ≈ {SAR_RATES[pForm.contract_currency]||1} SAR</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6}}>
                  <span style={{fontSize:13,fontWeight:700,color:'var(--text)',flexShrink:0}}>SAR</span>
                  <input type="text"
                    value={pForm.contract_value_sar_display||(pForm.contract_value_sar?Number(pForm.contract_value_sar).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}):'')}
                    onChange={e=>{
                      const raw=e.target.value.replace(/,/g,'');
                      const num=parseFloat(raw)||0;
                      setPForm(f=>({...f,contract_value_sar:num,contract_value_sar_display:raw===''?'':Number(raw||0).toLocaleString('en-US'),contract_value_sar_override:true}));
                    }}
                    onBlur={e=>{
                      const raw=e.target.value.replace(/,/g,'');
                      const num=parseFloat(raw)||0;
                      if(num>0)setPForm(f=>({...f,contract_value_sar:num,contract_value_sar_display:num.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}));
                    }}
                    placeholder="0.00"
                    style={{...IS,flex:1,padding:'6px 10px',fontSize:13,background:'var(--surface)',border:'1px solid #FDE68A'}}/>
                  {pForm.contract_value_sar_override&&(
                    <button onClick={()=>{
                      const sarVal=toSAR(pForm.contract_value,pForm.contract_currency||'SAR');
                      setPForm(f=>({...f,contract_value_sar:sarVal,contract_value_sar_display:'',contract_value_sar_override:false}));
                    }} className="btn" style={{background:'#FEF3C7',color:'#92400E',borderRadius:6,padding:'5px 10px',fontSize:11,border:'1px solid #FDE68A',flexShrink:0}}>↺ Reset</button>
                  )}
                </div>
              </div>
            )}
            {pForm.contract_value>0&&(pForm.contract_currency||'SAR')==='SAR'&&(
              <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>{fmtCurrency(pForm.contract_value,'SAR')}</div>
            )}
          </Field>

          {/* Contract Renewal Date + reminder */}
          <div style={{display:'flex',gap:12}}>
            <Field label={
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',width:'100%'}}>
                <span>Contract Renewal Date</span>
                {pForm.renewal_date&&pForm.end_date&&calcRenewalDate(pForm.end_date,pForm.reminder_days||30)===pForm.renewal_date&&(
                  <span style={{fontSize:9,color:GREEN,fontWeight:700,background:GREEN+'14',padding:'1px 6px',borderRadius:99}}>Auto</span>
                )}
              </div>
            } half>
              <input type="date" value={pForm.renewal_date||''} onChange={e=>setPForm(f=>({...f,renewal_date:e.target.value}))} style={IS}/>
              {pForm.end_date&&pForm.renewal_date&&(
                <div style={{fontSize:10,color:'var(--text3)',marginTop:3}}>
                  {pForm.reminder_days||30} days before contract end
                </div>
              )}
            </Field>
            <Field label="Remind Me Before" half>
              <select value={pForm.reminder_days||30} onChange={e=>{
                const days=Number(e.target.value);
                const renewal=calcRenewalDate(pForm.end_date,days);
                setPForm(f=>({...f,reminder_days:days,renewal_date:renewal||f.renewal_date}));
              }} style={IS}>
                <option value={7}>7 days before</option>
                <option value={14}>14 days before</option>
                <option value={30}>30 days before</option>
                <option value={60}>60 days before</option>
                <option value={90}>90 days before</option>
              </select>
            </Field>
          </div>

          {/* Contract file upload */}
          <Field label="Contract File (PDF or Word)">
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:10}}>
              {pForm.contract_file_name
                ?<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{fontSize:20}}>📄</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{pForm.contract_file_name}</div>
                      <div style={{fontSize:11,color:'var(--text3)'}}>Contract attached</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:6}}>
                    {pForm.contract_file_url&&<a href={pForm.contract_file_url} download={pForm.contract_file_name}
                      style={{fontSize:11,color:cp,fontWeight:600,padding:'4px 10px',borderRadius:6,background:cp+'12',border:'1px solid '+cp+'30',textDecoration:'none'}}>Download</a>}
                    <button onClick={()=>setPForm(f=>({...f,contract_file_url:'',contract_file_name:''}))}
                      className="btn" style={{background:'rgba(239,68,68,0.10)',color:RED,borderRadius:6,padding:'4px 10px',fontSize:11,border:'1px solid #FECACA'}}>Remove</button>
                  </div>
                </div>
                :<div style={{display:'flex',alignItems:'center',gap:10}}>
                  <span style={{fontSize:20}}>📎</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,color:'var(--text2)'}}>Attach PDF or Word document</div>
                    <div style={{fontSize:11,color:'var(--text3)'}}>Max 5MB</div>
                  </div>
                  <button onClick={()=>{
                    const inp=document.createElement('input');
                    inp.type='file';inp.accept='.pdf,.doc,.docx';
                    inp.onchange=async(e)=>{
                      const file=e.target.files[0];if(!file)return;
                      if(file.size>5*1024*1024)return showToast('File too large — max 5MB','error');
                      const reader=new FileReader();
                      reader.onload=(ev)=>setPForm(f=>({...f,contract_file_url:ev.target.result,contract_file_name:file.name}));
                      reader.readAsDataURL(file);
                    };
                    inp.click();
                  }} className="btn" style={{background:cp,color:'#fff',borderRadius:7,padding:'7px 14px',fontSize:12}}>Browse</button>
                </div>
              }
            </div>
          </Field>

          {/* Notes */}
          <Field label="Notes (optional)">
            <input value={pForm.notes||''} onChange={e=>setPForm(f=>({...f,notes:e.target.value}))} placeholder="Any additional notes…" style={IS}/>
          </Field>
        </div>

        <div style={{display:'flex',gap:9,marginTop:22}}>
          <button onClick={()=>setModal(null)} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'11px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          <button onClick={savePart} disabled={saving} className="btn" style={{flex:2,background:cp,color:'#fff',borderRadius:9,padding:'11px',fontSize:14,opacity:saving?0.7:1}}>{saving?'Saving…':modal==='add-part'?'Add Sponsor':'Save Changes'}</button>
        </div>
      </Modal>}

      {/* Manage Categories modal */}
      {modal==='manage-cats'&&<Modal onClose={()=>setModal('add-part')} width={420}>

                  <svg width={donutSize} height={donutSize} style={{transform:'rotate(-90deg)'}}>
                    <circle cx={donutSize/2} cy={donutSize/2} r={donutR} fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth={donutStroke}/>
                    <circle cx={donutSize/2} cy={donutSize/2} r={donutR} fill="none" stroke="#fff" strokeWidth={donutStroke}
                      strokeDasharray={doneDash+' '+donutCirc} strokeLinecap="round"/>
                  </svg>
                  <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                    <div style={{fontFamily:"'DM Mono',monospace",fontSize:20,fontWeight:800,color:'#fff',lineHeight:1}}>{rpt.comp}%</div>
                    <div style={{fontSize:8,color:'rgba(255,255,255,0.7)',fontWeight:700,textTransform:'uppercase'}}>done</div>
                  </div>
                </div>
              </div>

                  {label:'Activated',value:rpt.eventsDone,icon:'✓',color:GREEN},

              style={{...IS,color:matchForm.sport?'#1a2332':'#94a3b8'}}>
              <option value="" disabled>Select sport…</option>
              {sportsOptions.map(s=><option key={s}>{s}</option>)}
            </select>
          </Field>

          {/* 2. Activity date + start time */}
          <div style={{display:'flex',gap:12}}>
            <Field label="Activity Date" half>
              <input type="date" value={matchForm.match_date||''} onChange={e=>setMatchForm(f=>({...f,match_date:e.target.value}))} style={IS}/>
            </Field>
            <Field label="Event Start Time" half>
              <div style={{display:'flex',gap:4,alignItems:'center'}}>
                {/* Hour - 12h format */}
                <select
                  value={matchForm.match_time?(()=>{const h=parseInt(matchForm.match_time.split(':')[0]);return String(h===0?12:h>12?h-12:h).padStart(2,'0');})():''}
                  onChange={e=>{
                    const h12=parseInt(e.target.value);
                    const ampm=matchForm.match_ampm||'AM';
                    let h24=h12===12?(ampm==='AM'?0:12):(ampm==='PM'?h12+12:h12);
                    const m=matchForm.match_time?matchForm.match_time.split(':')[1]||'00':'00';
                    setMatchForm(f=>({...f,match_time:String(h24).padStart(2,'0')+':'+m}));
                  }}
                  style={{...IS,flex:1,padding:'9px 6px'}}>
                  <option value="" disabled>HH</option>
                  {['01','02','03','04','05','06','07','08','09','10','11','12'].map(h=><option key={h} value={h}>{h}</option>)}
                </select>
                <span style={{color:'var(--text3)',fontWeight:700,fontSize:16,flexShrink:0}}>:</span>
                {/* Minutes - 5 min increments */}
                <select
                  value={matchForm.match_time?matchForm.match_time.split(':')[1]||'00':''}
                  onChange={e=>{
                    const h=matchForm.match_time?matchForm.match_time.split(':')[0]||'00':'00';
                    setMatchForm(f=>({...f,match_time:h+':'+e.target.value}));
                  }}
                  style={{...IS,flex:1,padding:'9px 6px'}}>
                  <option value="" disabled>MM</option>
                  {['00','05','10','15','20','25','30','35','40','45','50','55'].map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                {/* AM / PM */}
                <select
                  value={matchForm.match_ampm||(matchForm.match_time&&parseInt(matchForm.match_time.split(':')[0])>=12?'PM':'AM')}
                  onChange={e=>{
                    const ampm=e.target.value;
                    const h24raw=matchForm.match_time?parseInt(matchForm.match_time.split(':')[0]||0):0;
                    const h12=h24raw===0?12:h24raw>12?h24raw-12:h24raw;
                    let newH24=h12===12?(ampm==='AM'?0:12):(ampm==='PM'?h12+12:h12);
                    const m=matchForm.match_time?matchForm.match_time.split(':')[1]||'00':'00';
                    setMatchForm(f=>({...f,match_ampm:ampm,match_time:String(newH24).padStart(2,'0')+':'+m}));
                  }}
                  style={{...IS,width:68,padding:'9px 6px',fontWeight:700,flexShrink:0}}>
                  <option value="AM">AM</option>
                  <option value="PM">PM</option>
                </select>
              </div>
            </Field>
          </div>

          {/* 3. Opponent */}
          <Field label="Opponent / Event Name">
            <input value={matchForm.opponent||''} onChange={e=>setMatchForm(f=>({...f,opponent:e.target.value}))} placeholder="e.g. Al Hilal, Training Day, Press Conference…" style={IS}/>
          </Field>

          {/* 4. Competition + Venue */}
          <div style={{display:'flex',gap:12}}>
            <Field label="Competition / Event Type" half>
              <input value={matchForm.competition||''} onChange={e=>setMatchForm(f=>({...f,competition:e.target.value}))} placeholder="e.g. Saudi Pro League" style={IS}/>
            </Field>
            <Field label="Venue" half>
              <select value={matchForm.venue||'Home'} onChange={e=>setMatchForm(f=>({...f,venue:e.target.value}))} style={IS}>
                <option>Home</option><option>Away</option><option>Neutral</option>
              </select>
            </Field>
          </div>

          {/* 5. Notes */}
          <Field label="Notes (optional)">
            <input value={matchForm.notes||''} onChange={e=>setMatchForm(f=>({...f,notes:e.target.value}))} placeholder="Optional notes…" style={IS}/>
          </Field>

          {/* 6. Sponsor selector */}
          <Field label="Sponsors with rights on this activity">
            <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:8,padding:10}}>
              {(()=>{
                const selectedSport=matchForm.sport;
                // Filter partners by sport: show if they sponsor this sport, sponsor "All Sports", or have no sports defined
                const eligiblePartners=[...partners].filter(p=>{
                  const sports=Array.isArray(p.sports)?p.sports:(typeof p.sports==='string'?JSON.parse(p.sports||'[]'):[]);
                  if(!sports.length)return true; // no sports set → show for all
                  if(sports.includes('All Sports'))return true;
                  if(!selectedSport)return true; // no sport selected yet → show all
                  return sports.includes(selectedSport);
                }).sort((a,b)=>tierRank(a.tier)-tierRank(b.tier)||a.name.localeCompare(b.name));

                const hiddenCount=partners.length-eligiblePartners.length;
                return(
                  <>
                    <p style={{fontSize:11,color:'var(--text3)',marginBottom:8}}>
                      {selectedSport
                        ?<>Showing <strong style={{color:'var(--text)'}}>{eligiblePartners.length}</strong> sponsors for <strong style={{color:cp}}>{selectedSport}</strong>{hiddenCount>0&&<span> · {hiddenCount} hidden (different sport)</span>}</>
                        :'Select a sport above to filter sponsors'
                      }
                    </p>
                    {eligiblePartners.length===0
                      ?<div style={{textAlign:'center',padding:'12px 0',color:'var(--text3)',fontSize:12}}>No sponsors found for {selectedSport}</div>
                      :<div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                        {eligiblePartners.map(p=>{
                          const sel=(matchForm.selectedPartners||[]).includes(p.partner_id);
                          const sports=Array.isArray(p.sports)?p.sports:(typeof p.sports==='string'?JSON.parse(p.sports||'[]'):[]);
                          const isAllSports=sports.includes('All Sports');
                          const obligCount=obligations.filter(o=>o.partner_id===p.partner_id).length;
                          return(
                            <button key={p.partner_id} type="button"
                              onClick={()=>setMatchForm(f=>({...f,selectedPartners:sel?(f.selectedPartners||[]).filter(x=>x!==p.partner_id):[...(f.selectedPartners||[]),p.partner_id]}))}
                              style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer',border:'1.5px solid '+(sel?p.color||cp:'#e2e8f0'),background:sel?(p.color||cp)+'14':'#fff',color:sel?p.color||cp:'#64748b',transition:'all 0.12s',position:'relative'}}>
                              <span style={{fontSize:14}}>{tierIcon(p.tier)}</span>
                              <span>{p.name}</span>
                              <span style={{fontSize:10,color:'var(--text3)'}}>({obligCount})</span>
                              {isAllSports&&<span style={{fontSize:9,background:'#e0f2fe',color:'#0284c7',borderRadius:99,padding:'1px 5px',fontWeight:700}}>All</span>}
                            </button>
                          );
                        })}
                      </div>
                    }
                    {(matchForm.selectedPartners||[]).length>0&&(()=>{
                      const totalRights=(matchForm.selectedPartners||[]).reduce((sum,pid)=>sum+obligations.filter(o=>o.partner_id===pid).length,0);
                      return <div style={{marginTop:8,fontSize:11,color:cp,fontWeight:600}}>{(matchForm.selectedPartners||[]).length} sponsors · {totalRights} rights will be tracked</div>;
                    })()}
                  </>
                );
              })()}
            </div>
          </Field>
        </div>
        <div style={{display:'flex',gap:9,marginTop:20}}>
          <button onClick={()=>{setMatchModal(false);setSelectedMatch(null);}} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          {selectedMatch&&<button onClick={()=>delMatch(selectedMatch.id)} className="btn" style={{background:'rgba(239,68,68,0.10)',color:RED,borderRadius:9,padding:'10px 14px',border:'1px solid #FECACA',fontSize:13}}>Delete</button>}
          <button onClick={saveMatch} disabled={saving} className="btn" style={{flex:2,background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:14,opacity:saving?0.7:1}}>{saving?'Saving…':selectedMatch?'Save Changes':'Add Activity'}</button>
        </div>
      </Modal>}

      {/* ── MATCH DETAIL MODAL ── */}
      {matchDetailModal&&selectedMatch&&!selectedMatch.multi&&(()=>{
        const m=selectedMatch;
        const acts=matchActivations.filter(a=>a.match_id===m.id);
        const partnerIds=[...new Set(acts.map(a=>a.partner_id))].sort((a,b)=>{
          const pa=partners.find(x=>x.partner_id===a),pb=partners.find(x=>x.partner_id===b);
          return tierRank(pa?.tier)-tierRank(pb?.tier)||(pa?.name||'').localeCompare(pb?.name||'');
        });
        const done=acts.filter(a=>(pendingActChanges[a.id]||a.status)==='Done').length;
        const missed=acts.filter(a=>(pendingActChanges[a.id]||a.status)==='Missed').length;
        const matchDate=new Date(m.match_date+'T00:00:00');
        return(
          <Modal onClose={()=>{setPendingActChanges({});setMatchDetailModal(false);setSelectedMatch(null);}} width={620} noScroll={false}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14,paddingBottom:12,borderBottom:'1px solid var(--border2)'}}>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:cp,textTransform:'uppercase',letterSpacing:1,marginBottom:3}}>
                  {matchDate.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
                  {m.match_time&&' · '+m.match_time.slice(0,5)}
                </div>
                <h2 style={{fontSize:18,fontWeight:800,color:'var(--text)'}}>{m.opponent}</h2>
                <p style={{fontSize:12,color:'var(--text3)',marginTop:2}}>{m.competition&&m.competition+' · '}{m.venue}{m.sport&&' · '+m.sport}</p>
              </div>
              <div style={{display:'flex',gap:8,flexShrink:0,alignItems:'flex-start'}}>
                <div style={{display:'flex',gap:6}}>
                  {[
                    {label:'DONE',val:done,color:GREEN,filter:'Done'},
                    {label:'MISSED',val:missed,color:RED,filter:'Missed'},
                    {label:'PENDING',val:acts.length-done-missed,color:'var(--text2)',filter:'Pending'},
                  ].map(s=>{
                    const isActive=actFilter===s.filter;
                    return(
                      <button key={s.filter} onClick={()=>setActFilter(actFilter===s.filter?null:s.filter)}
                        className="btn"
                        style={{textAlign:'center',background:isActive?s.color:s.color+'10',borderRadius:8,padding:'5px 10px',
                          border:'2px solid '+(isActive?s.color:s.color+'25'),transition:'all 0.15s',cursor:'pointer',
                          boxShadow:isActive?'0 2px 8px '+s.color+'44':'none'}}>
                        <div style={{fontFamily:"'DM Mono',monospace",fontSize:16,fontWeight:700,color:isActive?'#fff':s.color}}>{s.val}</div>
                        <div style={{fontSize:8,color:isActive?'rgba(255,255,255,0.8)':' #94a3b8',fontWeight:700,letterSpacing:0.5}}>{s.label}</div>
                      </button>
                    );
                  })}
                  {actFilter&&<button onClick={()=>setActFilter(null)} className="btn"
                    style={{background:'var(--surface3)',color:'var(--text2)',borderRadius:8,padding:'5px 9px',fontSize:10,border:'1px solid var(--border)',alignSelf:'center'}}>
                    ✕ All
                  </button>}
                </div>
                <button onClick={()=>{setMatchDetailModal(false);openEditMatch(m);}} className="btn"
                  style={{background:'var(--surface3)',color:'var(--text2)',borderRadius:8,padding:'7px 12px',fontSize:12,border:'1px solid var(--border)'}}>Edit</button>
              </div>
            </div>

            {acts.length===0
              ?<div style={{textAlign:'center',padding:'32px 0',color:'var(--text3)',fontSize:13}}>No sponsor rights assigned.<br/>Edit the activity to add sponsors.</div>
              :<div style={{display:'flex',flexDirection:'column',gap:8}}>
                {partnerIds.map(pid=>{
                  const p=partners.find(x=>x.partner_id===pid);
                  const pActs=acts.filter(a=>a.partner_id===pid);
                  const pDone=pActs.filter(a=>(pendingActChanges[a.id]||a.status)==='Done').length;
                  const pMissed=pActs.filter(a=>(pendingActChanges[a.id]||a.status)==='Missed').length;
                  const pPending=pActs.length-pDone-pMissed;
                  const isOpen=!!expandedActCats[pid];

                  // Group by category
                  const filteredPActs=actFilter?pActs.filter(a=>{const s=typeof pendingActChanges[a.id]==='object'?pendingActChanges[a.id].status:(pendingActChanges[a.id]||a.status);return s===actFilter;}):pActs;
                  const cats=[...new Set(filteredPActs.map(a=>a.category))].sort();
                  if(actFilter&&filteredPActs.length===0)return null;

                  return(
                    <div key={pid} style={{border:'1px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
                      {/* Partner header — clickable */}
                      <div onClick={()=>setExpandedActCats(e=>({...e,[pid]:!e[pid]}))}
                        style={{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',background:isOpen?cp+'08':'var(--surface2)',cursor:'pointer',userSelect:'none',transition:'background 0.12s'}}>
                        <span style={{fontSize:11,color:'var(--text3)',transform:isOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',transition:'transform 0.2s',flexShrink:0}}>▶</span>
                        <span style={{fontSize:16,flexShrink:0}}>{tierIcon(p?.tier)}</span>
                        <span style={{fontWeight:700,fontSize:14,color:'var(--text)',flex:1}}>{p?.name||pid}</span>
                        <TierBadge tier={p?.tier}/>
                        {/* Category summary pills */}
                        <div style={{display:'flex',gap:5,flexShrink:0}}>
                          {pDone>0&&<span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:GREEN+'14',color:GREEN,border:'1px solid '+GREEN+'25'}}>{pDone} done</span>}
                          {pMissed>0&&<span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:RED+'14',color:RED,border:'1px solid '+RED+'25'}}>{pMissed} missed</span>}
                          {pPending>0&&<span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'var(--surface3)',color:'var(--text2)',border:'1px solid var(--border)'}}>{pPending} pending</span>}
                        </div>
                      </div>

                      {/* Categories expanded */}
                      {isOpen&&<div style={{background:'var(--surface2)',borderTop:'1px solid '+cp+'20'}}>
                        {cats.map(cat=>{
                          const catActs=pActs.filter(a=>a.category===cat);
                          const catDone=catActs.filter(a=>(pendingActChanges[a.id]||a.status)==='Done').length;
                          const catKey=pid+'_'+cat;
                          const catOpen=!!expandedActCats[catKey]||!!actFilter;
                          return(
                            <div key={cat} style={{borderBottom:'1px solid #f8fafc'}}>
                              {/* Category row */}
                              <div onClick={()=>setExpandedActCats(e=>({...e,[catKey]:!e[catKey]}))}
                                style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px 8px 36px',cursor:'pointer',background:catOpen?cp+'10':'transparent',userSelect:'none'}}>
                                <span style={{fontSize:10,color:'var(--text3)',transform:catOpen?'rotate(90deg)':'rotate(0deg)',display:'inline-block',transition:'transform 0.2s',flexShrink:0}}>▶</span>
                                <span style={{fontSize:11,fontWeight:700,color:cp,textTransform:'uppercase',letterSpacing:0.8,flex:1}}>{cat}</span>
                                <span style={{fontSize:11,color:'var(--text3)'}}>{catActs.length} right{catActs.length>1?'s':''}</span>
                                <span style={{fontSize:11,fontWeight:700,color:catDone===catActs.length?GREEN:AMBER}}>{catDone}/{catActs.length}</span>
                              </div>

                              {/* Rights list */}
                              {catOpen&&<div style={{padding:'4px 14px 8px 48px',display:'flex',flexDirection:'column',gap:5}}>
                                {catActs.filter(act=>{if(!actFilter)return true;const s=typeof pendingActChanges[act.id]==='object'?pendingActChanges[act.id].status:(pendingActChanges[act.id]||act.status);return s===actFilter;}).map(act=>{
                                  const displayStatus=pendingActChanges[act.id]?.status||pendingActChanges[act.id]||act.status;
                                  const pendingReason=pendingActChanges[act.id]?.reason;
                                  const pendingNotes=pendingActChanges[act.id]?.notes;
                                  const isDone=displayStatus==='Done';
                                  const isMissed=displayStatus==='Missed';
                                  const isChanged=pendingActChanges[act.id]!==undefined;
                                  return(
                                    <div key={act.id} style={{background:isDone?GREEN+'10':isMissed?RED+'10':'var(--surface2)',borderRadius:8,border:'1px solid '+(isDone?GREEN+'20':isMissed?RED+'20':'#f1f5f9'),padding:'8px 10px',transition:'all 0.12s'}}>
                                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                                        {/* Done checkbox */}
                                        <div onClick={()=>{
                                            if(isDone){setPendingActChanges(p=>({...p,[act.id]:{status:'Pending',reason:'',notes:''}}));}
                                            else{setPendingActChanges(p=>({...p,[act.id]:{status:'Done',reason:'',notes:''}}));}
                                          }}
                                          style={{width:22,height:22,borderRadius:6,border:'2px solid '+(isDone?GREEN:'#d1d5db'),background:isDone?GREEN:'#fff',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,transition:'all 0.12s'}}>
                                          {isDone&&<span style={{color:'#fff',fontSize:13,fontWeight:800}}>✓</span>}
                                        </div>
                                        <div style={{flex:1,minWidth:0}}>
                                          <div style={{fontWeight:isDone?600:400,fontSize:13,color:isDone?'#1a2332':isMissed?RED:' #64748b',textDecoration:isMissed?'line-through':'none'}}>{act.right_name}</div>
                                          {/* Show missed reason */}
                                          {isMissed&&(()=>{
                                            const reason=pendingReason||act.missed_reason;
                                            const notes=pendingNotes||(typeof pendingActChanges[act.id]==='object'?pendingActChanges[act.id].notes:null)||act.activation_notes;
                                            return(<>
                                              {reason&&<div style={{display:'flex',alignItems:'center',gap:4,marginTop:3}}>
                                                <span style={{fontSize:10,color:'var(--text3)'}}>Reason:</span>
                                                <span style={{fontSize:10,color:RED,fontWeight:600}}>{reason}</span>
                                              </div>}
                                              {notes&&<div style={{display:'flex',alignItems:'flex-start',gap:4,marginTop:2,background:RED+'06',borderRadius:5,padding:'3px 7px'}}>
                                                <span style={{fontSize:10,color:'var(--text3)',flexShrink:0}}>Note:</span>
                                                <span style={{fontSize:10,color:'var(--text2)',fontStyle:'italic'}}>{notes}</span>
                                              </div>}
                                            </>);
                                          })()}
                                          {isChanged&&<span style={{fontSize:9,color:cp,fontWeight:700,background:cp+'14',padding:'1px 5px',borderRadius:99,marginTop:2,display:'inline-block'}}>unsaved</span>}
                                        </div>
                                        <div style={{display:'flex',gap:5,flexShrink:0,alignItems:'center'}}>
                                          <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,
                                            background:isDone?GREEN+'14':isMissed?RED+'14':AMBER+'14',
                                            color:isDone?GREEN:isMissed?RED:AMBER,
                                            minWidth:72,textAlign:'center'}}>
                                            {isDone?'Done':isMissed?'Missed':'Pending'}
                                          </span>
                                          {/* Miss button — opens reason dialog */}
                                          {!isMissed&&<button onClick={()=>{setMissedModal(act);setMissedForm({reason:'',notes:'',actId:act.id});}}
                                            className="btn" style={{background:'rgba(239,68,68,0.10)',border:'1px solid #FECACA',color:RED,borderRadius:6,padding:'3px 9px',fontSize:11}}>Miss</button>}
                                          {isMissed&&<button onClick={()=>setPendingActChanges(p=>({...p,[act.id]:{status:'Pending',reason:'',notes:''}}))}
                                            className="btn" style={{background:'var(--surface3)',border:'1px solid var(--border)',color:'var(--text2)',borderRadius:6,padding:'3px 9px',fontSize:11}}>Undo</button>}
                                        </div>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>}
                            </div>
                          );
                        })}
                      </div>}
                    </div>
                  );
                })}
              </div>
            }
            <div style={{display:'flex',gap:9,marginTop:14}}>
              <button onClick={()=>{setPendingActChanges({});setMatchDetailModal(false);setSelectedMatch(null);}} className="btn"
                style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Close</button>
              <button onClick={()=>saveMatchActivations(acts)} disabled={saving||Object.keys(pendingActChanges).length===0} className="btn"
                style={{flex:2,background:Object.keys(pendingActChanges).length>0?cp:'#94a3b8',color:'#fff',borderRadius:9,padding:'10px',fontSize:14,fontWeight:700,opacity:saving?0.7:1}}>
                {saving?'Saving…':Object.keys(pendingActChanges).length>0?('Save '+Object.keys(pendingActChanges).length+' change'+(Object.keys(pendingActChanges).length>1?'s':'')):'No changes'}
              </button>
            </div>
          </Modal>
        );
      })()}

      {/* ── ADD/EDIT ASSET MODAL ── */}
      {assetModal&&<Modal onClose={()=>setAssetModal(null)} width={520}>
        <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)',marginBottom:4}}>{assetModal==='add'?'Add Asset':'Edit Asset'}</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:16}}>Define a sponsorship asset and its current availability status</p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>

          <Field label="Asset Name">
            <input value={assetForm.name||''} onChange={e=>setAssetForm(f=>({...f,name:e.target.value}))}
              placeholder="e.g. Main jersey front sponsor" style={IS}/>
          </Field>

          <div style={{display:'flex',gap:12}}>
            <Field label="Category" half>
              <select value={assetForm.category||''} onChange={e=>setAssetForm(f=>({...f,category:e.target.value}))} style={IS}>
                {[...new Set([...partnerCats,'Stadium','Kit','Digital','Hospitality','Branding','Ticketing','Activation','PR','Merchandise'])].sort().map(c=><option key={c}>{c}</option>)}
              </select>
            </Field>
            <Field label="Status" half>
              <select value={assetForm.status||'Available'} onChange={e=>setAssetForm(f=>({...f,status:e.target.value,partner_id:e.target.value==='Available'?'':f.partner_id}))} style={IS}>
                {Object.keys(ASSET_STATUS_META).map(s=><option key={s} value={s}>{ASSET_STATUS_META[s].icon} {s}</option>)}
              </select>
            </Field>
          </div>

          <Field label="Description (optional)">
            <input value={assetForm.description||''} onChange={e=>setAssetForm(f=>({...f,description:e.target.value}))}
              placeholder="Brief description of what this asset includes…" style={IS}/>
          </Field>

          {/* Partner — only show if not Available */}
          {assetForm.status&&assetForm.status!=='Available'&&assetForm.status!=='Blocked'&&(
            <Field label={assetForm.status==='Sold'?'Sold To':'Partner / Prospect'}>
              <select value={assetForm.partner_id||''} onChange={e=>setAssetForm(f=>({...f,partner_id:e.target.value}))} style={{...IS,color:assetForm.partner_id?'#1a2332':'#94a3b8'}}>
                <option value="">Select partner…</option>
                {[...sortedPartners].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>(
