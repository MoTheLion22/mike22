              </div>
            </Field>
            {(assetForm.status==='Sold')&&<Field label="Sold For" half>
              <input type="number" value={assetForm.value_sold||''} onChange={e=>setAssetForm(f=>({...f,value_sold:Number(e.target.value)}))}
                placeholder="Actual sold value" style={IS} min={0}/>
            </Field>}
          </div>

          <Field label="Notes (optional)">
            <input value={assetForm.notes||''} onChange={e=>setAssetForm(f=>({...f,notes:e.target.value}))}
              placeholder="Any additional notes…" style={IS}/>
          </Field>
        </div>

        <div style={{display:'flex',gap:9,marginTop:20}}>
          <button onClick={()=>setAssetModal(null)} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          {assetModal==='edit'&&<button onClick={()=>delAsset(assetForm.id)} className="btn" style={{background:'rgba(239,68,68,0.10)',color:RED,borderRadius:9,padding:'10px 14px',border:'1px solid #FECACA',fontSize:13}}>Delete</button>}
          <button onClick={saveAsset} disabled={saving} className="btn" style={{flex:2,background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:14,fontWeight:700,opacity:saving?0.7:1}}>

        </div>

            {/* ── SEASON MANAGEMENT MODAL ── */}
      {seasonModal==='manage'&&<Modal onClose={()=>{setSeasonModal(false);setArchiveConfirm(false);}} width={560}>
        <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)',marginBottom:4}}>Season Management</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:18}}>Manage your current season and archive history</p>

        {/* Current season */}
        {currentSeason&&<div style={{background:cp+'08',border:'1px solid '+cp+'25',borderRadius:12,padding:'16px',marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontSize:18}}>📅</span>
                <span style={{fontWeight:800,fontSize:16,color:'var(--text)'}}>{currentSeason.label}</span>
                <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:GREEN+'14',color:GREEN,border:'1px solid '+GREEN+'25'}}>ACTIVE</span>
              </div>
              <div style={{fontSize:12,color:'var(--text3)',marginTop:4}}>
                {fmtDate(currentSeason.start_date)} → {fmtDate(currentSeason.end_date)}
              </div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:700,color:cp}}>{partners.length}</div>
              <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase'}}>Partners</div>
            </div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
            {[
              {l:'Obligations',v:obligations.length,c:'#3B82F6'},
              {l:'Activations',v:activations.length,c:GREEN},
              {l:'Activities',v:matches.length,c:'#8B5CF6'},
            ].map((k,i)=>(
              <div key={i} style={{textAlign:'center',background:'var(--surface)',borderRadius:8,padding:'8px',border:'1px solid var(--border2)'}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:18,fontWeight:700,color:k.c}}>{k.v}</div>
                <div style={{fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase'}}>{k.l}</div>
              </div>
            ))}
          </div>
          {!archiveConfirm
            ?<button onClick={()=>setArchiveConfirm(true)} className="btn"
              style={{width:'100%',background:AMBER,color:'#fff',borderRadius:8,padding:'10px',fontSize:13,fontWeight:700}}>
              📦 Archive Season & Start Fresh
            </button>
            :<div style={{background:'rgba(239,68,68,0.10)',border:'1px solid #FECACA',borderRadius:10,padding:14}}>
              <div style={{fontWeight:700,color:RED,marginBottom:8,fontSize:14}}>⚠️ Confirm Season Archive</div>
              <p style={{fontSize:12,color:'var(--text2)',lineHeight:1.7,marginBottom:12}}>
                This will <strong>archive all {activations.length} activations</strong>, <strong>{matches.length} activities</strong>, and <strong>reset all obligation counters to 0</strong>. Partners and rights will be kept for the new season. This cannot be undone.
              </p>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setArchiveConfirm(false)} className="btn"
                  style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:8,padding:'9px',fontSize:13,border:'1px solid var(--border)'}}>Cancel</button>
                <button onClick={archiveCurrentSeason} disabled={saving} className="btn"
                  style={{flex:2,background:RED,color:'#fff',borderRadius:8,padding:'9px',fontSize:13,fontWeight:700,opacity:saving?0.7:1}}>
                  {saving?'Archiving…':'✓ Yes, Archive & Reset'}
                </button>
              </div>
            </div>
          }
        </div>}

        {/* Create new season */}
        <div style={{border:'1px solid var(--border)',borderRadius:10,padding:16,marginBottom:16}}>
          <div style={{fontWeight:700,fontSize:13,color:'var(--text)',marginBottom:12}}>➕ Create New Season</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'flex',gap:12}}>
              <Field label="Start Date" half>
                <input type="date" value={newSeasonForm.start_date} onChange={e=>{
                  const start=e.target.value;
                  setNewSeasonForm(f=>{
                    const sy=new Date(start).getFullYear();
                    const ey=f.end_date?new Date(f.end_date).getFullYear():sy+1;
                    const generated=sy+'/'+(String(ey).slice(-2));
                    const wasAuto=!f.label||f.label===f._autoLabel;
                    const newLabel=wasAuto?generated:f.label;
                    return{...f,start_date:start,label:newLabel,_autoLabel:newLabel};
                  });
                }} style={IS}/>
              </Field>
              <Field label="End Date" half>
                <input type="date" value={newSeasonForm.end_date} onChange={e=>{
                  const end=e.target.value;
                  setNewSeasonForm(f=>{
                    const sy=f.start_date?new Date(f.start_date).getFullYear():new Date(end).getFullYear()-1;
                    const ey=new Date(end).getFullYear();
                    const generated=sy+'/'+(String(ey).slice(-2));
                    const wasAuto=!f.label||f.label===f._autoLabel;
                    const newLabel=wasAuto?generated:f.label;
                    return{...f,end_date:end,label:newLabel,_autoLabel:newLabel};
                  });
                }} style={IS}/>
              </Field>
            </div>
            <Field label="Season Label">
              <div style={{position:'relative'}}>
                <input value={newSeasonForm.label} onChange={e=>setNewSeasonForm(f=>({...f,label:e.target.value,_autoLabel:null}))}
                  placeholder="Auto-filled from dates…" style={{...IS,paddingRight:newSeasonForm.label===newSeasonForm._autoLabel?70:12}}/>
                {newSeasonForm.label&&newSeasonForm.label===newSeasonForm._autoLabel&&(
                  <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:9,fontWeight:700,color:GREEN,background:GREEN+'12',padding:'1px 6px',borderRadius:99,pointerEvents:'none'}}>Auto</span>
                )}
              </div>
            </Field>
          </div>
          <button onClick={createNewSeason} disabled={saving} className="btn"
            style={{width:'100%',background:cp,color:'#fff',borderRadius:8,padding:'9px',fontSize:13,marginTop:12,fontWeight:700,opacity:saving?0.7:1}}>
            {saving?'Creating…':'Create Season'}
          </button>
        </div>

        {/* Season history */}
        {seasons.filter(s=>s.status==='archived').length>0&&<div>
          <div style={{fontWeight:700,fontSize:13,color:'var(--text2)',textTransform:'uppercase',letterSpacing:0.8,marginBottom:10}}>📚 Archived Seasons</div>
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {seasons.filter(s=>s.status==='archived').sort((a,b)=>b.start_date.localeCompare(a.start_date)).map(s=>(
              <div key={s.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 14px',background:'var(--surface2)',borderRadius:8,border:'1px solid var(--border2)'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:13,color:'var(--text)'}}>{s.label}</div>
                  <div style={{fontSize:11,color:'var(--text3)',marginTop:2}}>{fmtDate(s.start_date)} → {fmtDate(s.end_date)}</div>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:10,color:'var(--text3)'}}>Archived {s.archived_at?new Date(s.archived_at).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):''}</span>
                  <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:99,background:'var(--surface3)',color:'var(--text3)',border:'1px solid var(--border)'}}>ARCHIVED</span>
                </div>
              </div>
            ))}
          </div>
        </div>}
      </Modal>}

            {/* ── MISSED REASON MODAL ── */}
      {missedModal&&<Modal onClose={()=>setMissedModal(null)} width={460}>
        <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)',marginBottom:4}}>Mark as Missed</h3>
        <div style={{background:RED+'08',border:'1px solid '+RED+'20',borderRadius:8,padding:'8px 12px',marginBottom:16,fontSize:13,color:RED,fontWeight:600}}>
          {missedModal.right_name}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Field label="Reason (required)">
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {missedReasons.map(r=>(
                <label key={r} style={{display:'flex',alignItems:'center',gap:9,padding:'8px 12px',borderRadius:8,border:'1.5px solid '+(missedForm.reason===r?RED:'#e2e8f0'),background:missedForm.reason===r?RED+'06':'var(--surface2)',cursor:'pointer',transition:'all 0.12s'}}>
                  <input type="radio" name="missed_reason" value={r} checked={missedForm.reason===r} onChange={()=>setMissedForm(f=>({...f,reason:r}))}
                    style={{accentColor:RED,width:15,height:15,flexShrink:0}}/>
                  <span style={{fontSize:13,color:'var(--text)',fontWeight:missedForm.reason===r?600:400}}>{r}</span>
                </label>
              ))}
            </div>
          </Field>
          <Field label="Notes (optional)">
            <textarea value={missedForm.notes||''} onChange={e=>setMissedForm(f=>({...f,notes:e.target.value}))}
              placeholder="Add any additional context…"
              style={{...IS,resize:'vertical',minHeight:72,fontFamily:"'Inter',sans-serif"}}/>
          </Field>
        </div>
        <div style={{display:'flex',gap:9,marginTop:18}}>
          <button onClick={()=>setMissedModal(null)} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          <button onClick={()=>{
            if(!missedForm.reason)return showToast('Please select a reason','error');
            const actId=missedModal.id;
            setPendingActChanges(p=>({...p,[actId]:{status:'Missed',reason:missedForm.reason,notes:missedForm.notes||''}}));
            setMissedModal(null);
          }} className="btn" style={{flex:2,background:RED,color:'#fff',borderRadius:9,padding:'10px',fontSize:14,fontWeight:700}}>Confirm Missed</button>
        </div>
      </Modal>}

      {modal==='club-settings'&&<Modal onClose={()=>setModal(null)}>
        <h3 style={{fontSize:17,fontWeight:800,color:'var(--text)',marginBottom:18}}>Club Settings</h3>
        <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
          <Field label="Club / Project Name"><input value={club.name} onChange={e=>setClub(c=>({...c,name:e.target.value}))} style={IS}/></Field>
          <Field label="Subtitle"><input value={club.notes||''} onChange={e=>setClub(c=>({...c,notes:e.target.value}))} placeholder="Sponsorship Rights Tracker" style={IS}/></Field>
          <Field label="Primary Color" half>
            <div style={{display:'flex',gap:7}}>
              <input type="color" value={club.primary_color||GREEN} onChange={e=>setClub(c=>({...c,primary_color:e.target.value}))} style={{...IS,width:42,padding:3,cursor:'pointer'}}/>
              <input value={club.primary_color||''} onChange={e=>setClub(c=>({...c,primary_color:e.target.value}))} style={{...IS,flex:1}}/>
            </div>
          </Field>
          <Field label="Logo" half>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              {club.logo&&<img src={club.logo} style={{width:34,height:34,borderRadius:7,objectFit:'cover',border:'1px solid var(--border)'}}/>}
              <button onClick={()=>logoRef.current?.click()} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:8,padding:'9px',fontSize:13,border:'1px solid var(--border)'}}>{club.logo?'Change Logo':'Upload Logo'}</button>
            </div>
          </Field>
        </div>
        <div style={{display:'flex',gap:9,marginTop:18}}>
          <button onClick={()=>setModal(null)} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          <button onClick={saveClubSettings} disabled={saving} className="btn" style={{flex:2,background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:14,opacity:saving?0.7:1}}>{saving?'Saving…':'Save Settings'}</button>
        </div>
      </Modal>}

      {/* ── INVENTORY FORM MODAL ── */}
      {modal==='inv-form'&&<Modal onClose={()=>setModal('settings')} width={480}>
        <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)',marginBottom:4}}>{editInvId?'Edit Right':'Add New Right'}</h3>
        <p style={{fontSize:12,color:'var(--text3)',marginBottom:18}}>This right will be available to assign to any sponsor</p>
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          <Field label="Category">
            <select value={invForm.category||''} onChange={e=>setInvForm(f=>({...f,category:e.target.value}))} style={IS}>
              <option value="" disabled>Select category…</option>
              {CAT_RIGHTS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </Field>
          <Field label="Right Name">
            <input value={invForm.right_name||''} onChange={e=>setInvForm(f=>({...f,right_name:e.target.value}))} placeholder="e.g. Jersey Logo (Men)" style={IS}/>
          </Field>
          <Field label="Description (optional)">
            <input value={invForm.description||''} onChange={e=>setInvForm(f=>({...f,description:e.target.value}))} placeholder="Brief description of this right…" style={IS}/>
          </Field>
          <div style={{display:'flex',gap:12}}>
            <Field label="Default Quantity" half>
              <input type="number" value={invForm.default_qty||1} onChange={e=>setInvForm(f=>({...f,default_qty:Number(e.target.value)}))} min={1} style={IS}/>
            </Field>
            <Field label="Unit" half>
              <select value={invForm.unit||'Season'} onChange={e=>setInvForm(f=>({...f,unit:e.target.value}))} style={IS}>
                {UNITS.map(u=><option key={u}>{u}</option>)}
              </select>
            </Field>
          </div>
        </div>
        <div style={{display:'flex',gap:9,marginTop:20}}>
          <button onClick={()=>setModal('settings')} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'10px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
          <button onClick={saveInv} disabled={saving} className="btn" style={{flex:2,background:cp,color:'#fff',borderRadius:9,padding:'10px',fontSize:14,opacity:saving?0.7:1}}>{saving?'Saving…':editInvId?'Save Changes':'Add to Inventory'}</button>
        </div>
      </Modal>}

      {/* ── RIGHTS PICKER MODAL ── */}
      {rightsModal&&(()=>{
        const partner=partners.find(p=>p.partner_id===rightsPickPid);
        const invCats=[...new Set(inventory.map(i=>i.category))].sort();
        const totalPicked=Object.keys(rightsPicked).length;
        const toggleCat=(cat)=>setExpandedCats(e=>({...e,[cat]:!e[cat]}));

        return(
          <Modal onClose={()=>setRightsModal(false)} width={660} noScroll={false}>
            {/* Header */}
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,paddingBottom:14,borderBottom:'1px solid var(--border2)'}}>
              <div style={{flex:1,minWidth:0}}>
                <h3 style={{fontSize:16,fontWeight:800,color:'var(--text)'}}>Assign Rights — {partner?.name}</h3>
                <p style={{fontSize:12,color:'var(--text3)',marginTop:2}}>Click a category to expand, then pick rights and set quantities</p>
              </div>
              {/* Selected count — left of X, not overlapping */}
              <div style={{textAlign:'center',flexShrink:0,background:totalPicked>0?cp+'12':'var(--surface2)',border:'1px solid '+(totalPicked>0?cp+'30':'#e2e8f0'),borderRadius:10,padding:'6px 14px'}}>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:22,fontWeight:800,color:totalPicked>0?cp:'#cbd5e1',lineHeight:1}}>{totalPicked}</div>
                <div style={{fontSize:9,color:'var(--text3)',fontWeight:700,textTransform:'uppercase',letterSpacing:0.5}}>selected</div>
              </div>
            </div>

            {/* Category accordions */}
            <div style={{display:'flex',flexDirection:'column',gap:7,marginBottom:16}}>
              {invCats.map(cat=>{
                const items=inventory.filter(i=>i.category===cat);
                const catPicked=items.filter(i=>rightsPicked[i.id]!==undefined).length;
                const isOpen=!!expandedCats[cat];
                const allPicked=items.length>0&&items.every(i=>rightsPicked[i.id]!==undefined);

                return(
                  <div key={cat} style={{border:`1px solid ${catPicked>0?cp+'44':'#e2e8f0'}`,borderRadius:10,transition:'border-color 0.15s'}}>

                    {/* Category header — clickable to expand */}
                    <div onClick={()=>toggleCat(cat)}
                      style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'11px 14px',background:catPicked>0?cp+'08':'var(--surface2)',cursor:'pointer',userSelect:'none'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        {/* Expand arrow */}
                        <span style={{fontSize:12,color:'var(--text3)',transition:'transform 0.2s',display:'inline-block',transform:isOpen?'rotate(90deg)':'rotate(0deg)'}}>▶</span>
                        <span style={{fontWeight:700,fontSize:14,color:'var(--text)'}}>{cat}</span>
                        <span style={{fontSize:11,color:'var(--text3)'}}>{items.length} rights</span>
                        {catPicked>0&&<span style={{fontSize:10,color:cp,fontWeight:700,background:cp+'14',padding:'2px 8px',borderRadius:99,border:`1px solid ${cp}30`}}>{catPicked} / {items.length} selected</span>}
                      </div>
                      {/* Select all / deselect all — stop propagation so it doesn't toggle expand */}
                      <button onClick={e=>{
                        e.stopPropagation();
                        const np={...rightsPicked};
                        if(allPicked){items.forEach(i=>delete np[i.id]);}
                        else{items.forEach(i=>{if(np[i.id]===undefined)np[i.id]=i.default_qty||1;});}
                        setRightsPicked(np);
                        if(!isOpen)setExpandedCats(ev=>({...ev,[cat]:true}));
                      }} className="btn" style={{fontSize:11,color:allPicked?RED:cp,background:allPicked?'rgba(239,68,68,0.10)':cp+'12',borderRadius:7,padding:'4px 11px',border:`1px solid ${allPicked?'rgba(239,68,68,0.25)':cp+'30'}`,flexShrink:0}}>
                        {allPicked?'Clear all':'Select all'}
                      </button>
                    </div>

                    {/* Rights list — only shown when expanded */}
                    {isOpen&&(
                      <div style={{background:'var(--surface)',borderTop:`1px solid ${catPicked>0?cp+'22':'#f1f5f9'}`,overflow:'visible'}}>
                        {items.length===0
                          ?<div style={{padding:'14px 16px',fontSize:12,color:'var(--text3)',fontStyle:'italic'}}>No rights in this category yet. Add them in Settings → Rights Inventory.</div>
                          :items.map((item,idx)=>{
                            const picked=rightsPicked[item.id]!==undefined;
                            const qty=rightsPicked[item.id]||item.default_qty||1;
                            return(
                              <div key={item.id}
                                style={{display:'flex',alignItems:'center',gap:12,padding:'10px 16px',background:picked?cp+'06':'#fff',borderBottom:idx<items.length-1?'1px solid #f8fafc':'none',transition:'background 0.12s',cursor:'pointer'}}
                                onClick={()=>{
                                  const np={...rightsPicked};
                                  if(picked)delete np[item.id]; else np[item.id]=item.default_qty||1;
                                  setRightsPicked(np);
                                }}>
                                {/* Custom checkbox */}
                                <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${picked?cp:'#d1d5db'}`,background:picked?cp:'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.12s'}}>
                                  {picked&&<span style={{color:'#fff',fontSize:11,fontWeight:700,lineHeight:1}}>✓</span>}
                                </div>

                                {/* Right info */}
                                <div style={{flex:1,minWidth:0}}>
                                  <div style={{fontWeight:picked?600:400,fontSize:13,color:picked?'#1a2332':'#64748b'}}>{item.right_name}</div>
                                  {item.description&&<div style={{fontSize:11,color:'var(--text3)',marginTop:1}}>{item.description}</div>}
                                </div>

                                {/* Qty controls — only show when picked, stop row click */}
                                <div onClick={e=>e.stopPropagation()} style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
                                  {picked?(
                                    <>
                                      <button onClick={()=>{const np={...rightsPicked};np[item.id]=Math.max(1,(np[item.id]||1)-1);setRightsPicked(np);}}
                                        className="btn" style={{background:'var(--surface)',border:'1px solid var(--border)',color:'var(--text2)',borderRadius:6,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700}}>−</button>
                                      <input type="number" value={qty} min={1}
                                        onChange={e=>{const np={...rightsPicked};np[item.id]=Math.max(1,Number(e.target.value)||1);setRightsPicked(np);}}
                                        style={{width:44,height:26,textAlign:'center',fontFamily:"'DM Mono',monospace",fontSize:13,fontWeight:700,color:cp,border:`1px solid ${cp}44`,borderRadius:6,background:cp+'08'}}/>
                                      <button onClick={()=>{const np={...rightsPicked};np[item.id]=(np[item.id]||1)+1;setRightsPicked(np);}}
                                        className="btn" style={{background:cp+'14',border:`1px solid ${cp}44`,color:cp,borderRadius:6,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700}}>+</button>
                                      <span style={{fontSize:11,color:'var(--text3)',minWidth:42,textAlign:'left'}}>{item.unit}</span>
                                    </>
                                  ):(
                                    <span style={{fontSize:11,color:'var(--text4)',minWidth:90,textAlign:'right'}}>Default: {item.default_qty} {item.unit}</span>
                                  )}
                                </div>
                              </div>
                            );
                          })
                        }
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Footer */}
            <div style={{display:'flex',gap:9}}>
              <button onClick={()=>setRightsModal(false)} className="btn" style={{flex:1,background:'var(--surface3)',color:'var(--text2)',borderRadius:9,padding:'11px',border:'1px solid var(--border)',fontSize:14}}>Cancel</button>
              <button onClick={saveRightsPicker} disabled={saving} className="btn"
                style={{flex:2,background:totalPicked>0?cp:'#94a3b8',color:'#fff',borderRadius:9,padding:'11px',fontSize:14,fontWeight:700,opacity:saving?0.7:1}}>
                {saving?'Saving…':totalPicked>0?('Save '+totalPicked+' Right'+(totalPicked>1?'s':'')):'Select rights to save'}
              </button>
            </div>
          </Modal>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
